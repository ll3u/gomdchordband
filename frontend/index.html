<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Chords PWA</title>
    <meta name="theme-color" content="#2c3e50">
    <meta name="description" content="Offline chord sheets for band rehearsals">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Rendering-Bibliotheken (Markdown bleibt, ChordSheetJS kommt lokal hinzu) -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
<script src="/ChordSheetJS.bundle.min.js"></script>

    <link rel="stylesheet" href="/styles.css">

    <!-- Lokales CSS für die Skalierung und Ausrichtung der MDI-Vektor-Icons -->
    <style>
        .mdi-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            vertical-align: middle;
            display: inline-block;
        }
        .btn-icon .mdi-icon {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="top-bar" style="display: flex; align-items: center; justify-content: space-between; padding: 0 12px; height: 44px; box-sizing: border-box;">
            <div class="left-controls" style="display: flex; align-items: center;">
                <button id="sidebar-toggle" class="btn-icon">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
                </button>
                <!-- KORRIGIERT: Das h1-Tag mit dem Seitentitel wurde restlos entfernt -->
            </div>
            
            <!-- KORRIGIERT: Alle drei Buttons stehen nun absolut stabil in einer Reihe nebeneinander -->
            <div class="actions" style="display: flex; align-items: center; gap: 8px;">
                <!-- Refresh Button -->
                <button id="btn-refresh">
                    <svg class="mdi-icon" viewBox="0 0 24 24">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.5">
                            <path stroke-miterlimit="10" d="M18.024 7.043A8.374 8.374 0 0 0 3.74 12.955" />
                            <path stroke-linejoin="round" d="m17.35 2.75l.832 3.372a1.123 1.123 0 0 1-.854 1.382l-3.372.843" />
                            <path stroke-miterlimit="10" d="M5.976 16.957a8.374 8.374 0 0 0 14.285-5.912" />
                            <path stroke-linejoin="round" d="m6.65 21.25l-.832-3.372a1.124 1.124 0 0 1 .855-1.382l3.371-.843" />
                        </g>
                    </svg>
                </button>
                
                <!-- Export Button -->
                <button id="btn-export">
                    <svg class="mdi-icon" viewBox="0 0 24 24">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path fill="currentColor" d="m23 12l-4-4v3h-9v2h9v3M1 18V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3h-2V6H3v12h12v-3h2v3a2 2 0 0 1-2 2H3a2 2 0 0 1-2 2" />
                    </svg>
                </button>
                
                <!-- Import Button -->
                <button id="btn-import">
                    <svg class="mdi-icon" viewBox="0 0 24 24"> 
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path fill="currentColor" d="m14 12l-4-4v3H2v2h8v3m10 2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v3h2V6h12v12H6v-3H4v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2" />
                    </svg>
                </button>
                <input type="file" id="import-file" style="display: none;" accept=".json">
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar (einklappbar) -->
            <aside class="sidebar" id="sidebar">
                <h2>Songs</h2>
                <ul id="song-list">
                    <!-- Wird dynamisch befüllt -->
                </ul>
            </aside>

            <!-- Scroll-Container für Text und Canvas -->
            <main class="content-viewer" id="scroll-container">
                <div class="canvas-text-wrapper" id="wrapper">
                    <div id="song-render" class="song-content">
                        <!-- Gerendertes Markdown landet hier -->
                    </div>
                    <canvas id="annotation-canvas"></canvas>
                </div>
            </main>
        </div>

        <!-- Untere Toolbar für Zeichnen & Autoscroll -->
        <footer class="bottom-bar">
            <div class="toolbar-group">
                <button id="btn-autoscroll" class="btn-action play-btn" style="display: inline-flex; align-items: center; gap: 6px;">
                    <svg id="svg-play-icon" viewBox="0 0 24 24" style="width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
                        <path d="M18.57 10.58L9.07 4.96C8.21 4.45 7.12 5.07 7.12 6.08V17.32C7.12 18.33 8.21 18.95 9.07 18.44L18.57 12.82C19.4 12.33 19.4 11.08 18.57 10.58Z"/>
                    </svg>
                    <svg id="svg-pause-icon" viewBox="0 0 24 24" style="width: 22px; height: 22px; display: none;">
                        <g fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M2 6c0-1.886 0-2.828.586-3.414S4.114 2 6 2s2.828 0 3.414.586S10 4.114 10 6v12c0 1.886 0 2.828-.586 3.414S7.886 22 6 22s-2.828 0-3.414-.586S2 19.886 2 18z" />
                            <path d="M14 6c0-1.886 0-2.828.586-3.414S16.114 2 18 2s2.828 0 3.414.586S22 4.114 22 6v12c0 1.886 0 2.828-.586 3.414S19.886 22 18 22s-2.828 0-3.414-.586S14 19.886 14 18z" opacity=".5" />
                        </g>
                    </svg>
                </button>
                <div class="bpm-slider-container">
                    <input type="range" id="bpm-slider" min="40" max="240" value="90">
                    <span id="bpm-val-display">90</span> <span class="bpm-label">x Speed</span>
                </div>

                <!-- Transponier-Buttons inklusive Anzeige der aktuellen Tonart-Verschiebung -->
                <div class="transpose-container" style="display: inline-flex; align-items: center; gap: 6px; margin-left: 12px;">
                    <button id="btn-transpose-down" class="btn-tool-action" style="display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; padding: 0;" title="Tonart senken">
                        <svg class="mdi-icon" viewBox="0 0 24 24" style="width: 18px; height: 18px;"><path d="M19,13H5V11H19V13Z"/></svg>
                    </button>
                    <span id="transpose-val-display" style="font-weight: bold; min-width: 28px; text-align: center; font-family: monospace; font-size: 14px; color: var(--text-dark);">0</span>
                    <button id="btn-transpose-up" class="btn-tool-action" style="display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; padding: 0;" title="Tonart erhöhen">
                        <svg class="mdi-icon" viewBox="0 0 24 24" style="width: 18px; height: 18px;"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
                    </button>
                </div>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-group">
                <!-- Ersetzt Emojis durch mdi:pencil, mdi:eraser, mdi:undo und mdi:delete -->
                <button id="tool-draw" class="btn-tool active">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none" />
                    <path fill="currentColor" d="m11.4 18.161l7.396-7.396a10.3 10.3 0 0 1-3.326-2.234a10.3 10.3 0 0 1-2.235-3.327L5.839 12.6c-.577.577-.866.866-1.114 1.184a6.6 6.6 0 0 0-.749 1.211c-.173.364-.302.752-.56 1.526l-1.362 4.083a1.06 1.06 0 0 0 1.342 1.342l4.083-1.362c.775-.258 1.162-.387 1.526-.56q.647-.308 1.211-.749c.318-.248.607-.537 1.184-1.114m9.448-9.448a3.932 3.932 0 0 0-5.561-5.561l-.887.887l.038.111a8.75 8.75 0 0 0 2.092 3.32a8.75 8.75 0 0 0 3.431 2.13z" /></svg>
                </button>
                <button id="tool-erase" class="btn-tool">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none" />
                    <path fill="currentColor" d="M14.952 3c-1.037 0-1.872.835-3.542 2.505l-4.91 4.91l7.085 7.085l4.91-4.91C20.165 10.92 21 10.085 21 9.048c0-1.038-.835-1.873-2.505-3.543S15.99 3 14.952 3" opacity=".5" />
                    <path fill="currentColor" d="M13.585 17.5L6.5 10.415l-.995.995C3.835 13.08 3 13.915 3 14.952c0 1.038.835 1.873 2.505 3.543S8.01 21 9.048 21c1.037 0 1.872-.835 3.542-2.505z" />
                    <path fill="currentColor" d="M9.033 21H9zm.03 0c.796-.006 1.476-.506 2.51-1.5H21a.75.75 0 0 1 0 1.5z" opacity=".5" /></svg>
                </button>
                <button id="btn-undo" class="btn-tool-action">
                    <svg class="mdi-icon" viewBox="0 0 24 24" style="margin-right: 4px;"><path d="M12.5,8C9.85,8 7.45,9 5.6,10.6L2,7V16H11L7.38,12.38C8.77,11.22 10.54,10.5 12.5,10.5C16.04,10.5 19.05,12.81 20.1,16L22.47,15.22C21.08,11.08 17.14,8 12.5,8Z"/></svg>
                </button> 
                
                <div class="color-picker-wrapper" style="position: relative; display: inline-block; vertical-align: middle; cursor: pointer;">
                <svg id="svg-color-icon" viewBox="0 0 24 24" style="width: 26px; height: 26px; fill: #ff4757; transition: fill 0.1s ease;">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 9.5 21 7.5 19.5 6C18 4.5 15.5 3.5 12 3.5C6.47715 3.5 2 7.97715 2 13.5C2 16.5 3.5 19 6 20.5C7.5 21.5 9.5 22 12 22ZM6.5 11.5C7.32843 11.5 8 10.8284 8 10C8 9.17157 7.32843 8.5 6.5 8.5C5.67157 8.5 5 9.17157 5 10C5 10.8284 5.67157 11.5 6.5 11.5ZM10.5 8.5C11.3284 8.5 12 7.8284 12 7C12 6.17157 11.3284 5.5 10.5 5.5C9.67157 5.5 9 6.17157 9 7C9 7.8284 9.67157 8.5 10.5 8.5ZM15.5 9.5C16.3284 9.5 17 8.8284 17 8C17 7.17157 16.3284 6.5 15.5 6.5C14.6716 6.5 14 7.17157 14 8C14 8.8284 14.6716 9.5 15.5 9.5ZM17.5 14C18.3284 14 19 13.3284 19 12.5C19 11.6716 18.3284 11 17.5 11C16.6716 11 16 11.6716 16 12.5C16 13.3284 16.6716 14 17.5 14Z"/>
                </svg>
                <input type="color" id="color-picker" value="#ff4757" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
            </div>
                <input type="range" id="brush-size" min="2" max="15" value="5">
                <button id="btn-clear-canvas" class="btn-danger">
                    <svg class="mdi-icon" viewBox="0 0 24 24" style="margin-right: 4px;"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                </button>
            </div>
        </footer>
    </div>
    <script src="/sw-register.js"></script>
    <script src="app.js"></script>
</body>
</html>
