<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=overlays-content">
    <title>chordBand - {{.Version}}</title>
    <meta name="theme-color" content="#2c3e50">
    <meta name="description" content="Offline chord sheets for band rehearsals">
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self';
               script-src 'self';
               style-src 'self';
               img-src 'self' data:;
               connect-src 'self';
               font-src 'self';
               object-src 'none';
               base-uri 'self';
               form-action 'self';">

    <link rel="manifest" href="/manifest.json">

    <script src="/CanvasTextNote.js"></script>
    <script src="/ChordSheetJS.bundle.min.js"></script>
    <script   ipt src="/purify.min.js"></script>   

    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="left-controls">
                <button id="sidebar-toggle" class="btn-icon">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
                    <span id="menu-hint" class="pulse-dot"></span>
                </button>
            </div>
            
            <div class="actions">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round">
                        <svg class="icon sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
                            <path d="M0 0h24v24H0z" fill="none" />
                            <g fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="5" />
                                <path stroke-linecap="round" d="M12 2v2m0 16v2M4 12H2m20 0h-2" />
                                <path stroke-linecap="round" d="m19.778 4.223l-2.222 2.031M4.222 4.223l2.222 2.031m0 11.302l-2.222 2.222m15.556-.001l-2.222-2.222" opacity=".5" />
                            </g>
                        </svg>

                        <svg class="icon moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
                            <path d="M0 0h24v24H0z" fill="none" />
                            <path fill="currentColor" fill-rule="evenodd" d="M22 12c0 5.523-4.477 10-10 10a10 10 0 0 1-3.321-.564A9 9 0 0 1 8 18a8.97 8.97 0 0 1 2.138-5.824A6.5 6.5 0 0 0 15.5 15a6.5 6.5 0 0 0 5.567-3.143c.24-.396.933-.32.933.143" clip-rule="evenodd" opacity=".5" />
                            <path fill="currentColor" d="M2 12c0 4.359 2.789 8.066 6.679 9.435A9 9 0 0 1 8 18c0-2.221.805-4.254 2.138-5.824A6.47 6.47 0 0 1 9 8.5a6.5 6.5 0 0 1 3.143-5.567C12.54 2.693 12.463 2 12 2C6.477 2 2 6.477 2 12" />
                        </svg>
                    </div>
                </label>

                <button id="btn-refresh">
                    <svg xmlns="http://www.w3.org/2000/svg" class="mdi-icon" viewBox="0 0 22 22">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path fill="currentColor" d="M12.079 2.25c-4.794 0-8.734 3.663-9.118 8.333H2a.75.75 0 0 0-.528 1.283l1.68 1.666a.75.75 0 0 0 1.056 0l1.68-1.666a.75.75 0 0 0-.528-1.283h-.893c.38-3.831 3.638-6.833 7.612-6.833a7.66 7.66 0 0 1 6.537 3.643a.75.75 0 1 0 1.277-.786A9.16 9.16 0 0 0 12.08 2.25" />
                        <path fill="currentColor" d="M20.841 10.467a.75.75 0 0 0-1.054 0L18.1 12.133a.75.75 0 0 0 .527 1.284h.899c-.381 3.83-3.651 6.833-7.644 6.833a7.7 7.7 0 0 1-6.565-3.644a.75.75 0 1 0-1.276.788a9.2 9.2 0 0 0 7.84 4.356c4.809 0 8.766-3.66 9.151-8.333H22a.75.75 0 0 0 .527-1.284z" opacity=".5" />
                    </svg>
                </button>
                
                <button id="btn-fullscreen">
                    <svg xmlns="http://www.w3.org/2000/svg" class="mdi-icon" viewBox="0 0 22 22">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path fill="currentColor" fill-rule="evenodd" d="M18.29 2.89c-1.028-.138-2.383-.14-4.29-.14a.75.75 0 0 1 0-1.5h.056c1.838 0 3.294 0 4.433.153c1.172.158 2.121.49 2.87 1.238c.748.749 1.08 1.698 1.238 2.87c.153 1.14.153 2.595.153 4.433V10a.75.75 0 0 1-1.5 0c0-1.907-.002-3.261-.14-4.29c-.135-1.005-.389-1.585-.812-2.008s-1.003-.677-2.009-.812M2 13.25a.75.75 0 0 1 .75.75c0 1.907.002 3.262.14 4.29c.135 1.005.389 1.585.812 2.008s1.003.677 2.009.812c1.028.138 2.382.14 4.289.14a.75.75 0 0 1 0 1.5h-.056c-1.838 0-3.294 0-4.433-.153c-1.172-.158-2.121-.49-2.87-1.238c-.748-.749-1.08-1.698-1.238-2.87c-.153-1.14-.153-2.595-.153-4.433V14a.75.75 0 0 1 .75-.75" clip-rule="evenodd" />
                        <path fill="currentColor" d="M9.944 1.25H10a.75.75 0 0 1 0 1.5c-1.907 0-3.261.002-4.29.14c-1.005.135-1.585.389-2.008.812S3.025 4.705 2.89 5.71c-.138 1.029-.14 2.383-.14 4.29a.75.75 0 0 1-1.5 0v-.056c0-1.838 0-3.294.153-4.433c.158-1.172.49-2.121 1.238-2.87c.749-.748 1.698-1.08 2.87-1.238c1.14-.153 2.595-.153 4.433-.153M22 13.25a.75.75 0 0 1 .75.75v.056c0 1.838 0 3.294-.153 4.433c-.158 1.172-.49 2.121-1.238 2.87c-.749.748-1.698 1.08-2.87 1.238c-1.14.153-2.595.153-4.433.153H14a.75.75 0 0 1 0-1.5c1.907 0 3.262-.002 4.29-.14c1.005-.135 1.585-.389 2.008-.812s.677-1.003.812-2.009c.138-1.027.14-2.382.14-4.289a.75.75 0 0 1 .75-.75" opacity=".5" />
                    </svg>
                </button>
                
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>Songs</h2>
                    <div class="song-actions">
                        <button id="btn-export">
                            <svg class="mdi-icon" viewBox="0 0 24 24">
                                <path d="M0 0h24v24H0z" fill="none" />
                                <path fill="currentColor" d="m23 12l-4-4v3h-9v2h9v3M1 18V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3h-2V6H3v12h12v-3h2v3a2 2 0 0 1-2 2H3a2 2 0 0 1-2 2" />
                            </svg>
                        </button>
                        <button id="btn-import">
                            <svg class="mdi-icon" viewBox="0 0 24 24">
                                <path d="M0 0h24v24H0z" fill="none" />
                                <path fill="currentColor" d="m14 12l-4-4v3H2v2h8v3m10 2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v3h2V6h12v12H6v-3H4v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2" />
                            </svg>
                        </button>
                        <input type="file" id="import-file" accept=".json">
                    </div>
                </div>
                <div class="playlist-section">
                    <div class="playlist-chip-group" id="playlist-chips">
                        <button class="playlist-chip playlist-chip-active" data-playlist="all">All</button>
                    </div>
                </div>
                <ul id="song-list"></ul>
            </aside>

            <main class="content-viewer" id="scroll-container">
                <div class="canvas-text-wrapper" id="wrapper">
                    <div id="song-render" class="song-content"></div>
                    <canvas id="annotation-canvas"></canvas>
                </div>
            </main>
        </div>

        <div class="action-overlay-container">
            
            <div class="bpm-slider-container">
                <input type="range" id="bpm-slider" min="40" max="420" value="190">
                <span id="bpm-val-display">90</span>
                <span class="bpm-label">x Speed</span>
            </div>
            
            <button id="btn-footer-collapse" class="btn-collapse">
                <svg viewBox="0 0 24 24">
                    <path id="svg-collapse-arrow" d="M6 15L12 9L18 15"/>
                </svg>
            </button>
            
           <div class="play-button-wrapper">
                <svg class="progress-ring" viewBox="-25 -25 250 250" version="1.1" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" fill="transparent" stroke="#2f3542" stroke-width="16"></circle>
                    <circle class="progress-ring-fill" cx="100" cy="100" r="90" fill="transparent" 
                            stroke="#ffffff" stroke-width="18" stroke-linecap="butt" 
                            stroke-dasharray="565.48" stroke-dashoffset="565.48"></circle>
                </svg>
                <button id="btn-autoscroll" class="btn-action play-btn">
                    <svg id="svg-play-icon" class="play-icon" viewBox="0 0 24 24">
                        <path d="M0 0h24v24H0z" fill="none"/>
                        <path fill="currentColor" fill-rule="evenodd" d="M23 12c0-1.035-.53-2.07-1.591-2.647L8.597 2.385C6.534 1.264 4 2.724 4 5.033V12z" clip-rule="evenodd"/>
                        <path fill="currentColor" d="m8.597 21.615l12.812-6.968A2.99 2.99 0 0 0 23 12H4v6.967c0 2.31 2.534 3.769 4.597 2.648" opacity=".5"/>
                    </svg>
                    <svg id="svg-pause-icon" class="pause-icon" viewBox="0 0 24 24">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path fill="currentColor" d="M2 6c0-1.886 0-2.828.586-3.414S4.114 2 6 2s2.828 0 3.414.586S10 4.114 10 6v12c0 1.886 0 2.828-.586 3.414S7.886 22 6 22s-2.828 0-3.414-.586S2 19.886 2 18z" />
                        <path fill="currentColor" d="M14 6c0-1.886 0-2.828.586-3.414S16.114 2 18 2s2.828 0 3.414.586S22 4.114 22 6v12c0 1.886 0 2.828-.586 3.414S19.886 22 18 22s-2.828 0-3.414-.586S14 19.886 14 18z" opacity=".5" />
                    </svg>
                </button>
            </div>
        </div>

        <footer id="collapsible-drawer-bar" class="bottom-bar drawer-closed">
            
            <div class="transpose-container">
                <button id="btn-transpose-down" class="btn-tool-action" title="Tonart senken">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z"/></svg>
                </button>

                <span id="transpose-val-display">0</span>
                <button id="btn-transpose-up" class="btn-tool-action" title="Tonart erhöhen">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
                </button>

                <div class="font-slider-container">
                    <input type="range" id="font-size-slider" min="16" max="24" value="16" />
                    <span id="font-size-display">16</span>
                </div>
            </div>

            <div class="canvas-tools-group">
                <button id="tool-draw" class="btn-tool">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path fill="currentColor" d="m11.4 18.161l7.396-7.396a10.3 10.3 0 0 1-3.326-2.234a10.3 10.3 0 0 1-2.235-3.327L5.839 12.6c-.577.577-.866.866-1.114 1.184a6.6 6.6 0 0 0-.749 1.211c-.173.364-.302.752-.56 1.526l-1.362 4.083a1.06 1.06 0 0 0 1.342 1.342l4.083-1.362c.775-.258 1.162-.387 1.526-.56q.647-.308 1.211-.749c.318-.248.607-.537 1.184-1.114m9.448-9.448a3.932 3.932 0 0 0-5.561-5.561l-.887.887l.038.111a8.75 8.75 0 0 0 2.092 3.32a8.75 8.75 0 0 0 3.431 2.13z" /></svg>
                </button>
                <button id="tool-text" class="btn-tool">
                    <svg class="mdi-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <g fill="none">
                            <path fill="currentColor" fill-rule="evenodd" d="M7.934 2h8.132c.886 0 1.65 0 2.262.082c.655.088 1.284.287 1.793.797c.51.51.709 1.138.797 1.793C21 5.284 21 6.048 21 6.934V7.95a1 1 0 1 1-2 0V7c0-.971-.002-1.599-.064-2.061c-.059-.434-.153-.57-.229-.646s-.212-.17-.646-.229C17.6 4.002 16.971 4 16 4h-3v17a1 1 0 1 1-2 0V4H8c-.971 0-1.599.002-2.061.064c-.434.059-.57.153-.646.229s-.17.212-.229.646C5.002 5.4 5 6.029 5 7v.95a1 1 0 1 1-2 0V6.934c0-.886 0-1.65.082-2.262c.088-.655.287-1.284.797-1.793c.51-.51 1.138-.709 1.793-.797C6.284 2 7.048 2 7.934 2" clip-rule="evenodd" />
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10" />
                        </g>
                    </svg>
                </button>
                <button id="tool-erase" class="btn-tool">
                    <svg class="mdi-icon" viewBox="0 0 24 24">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path fill="currentColor" d="M14.952 3c-1.037 0-1.872.835-3.542 2.505l-4.91 4.91l7.085 7.085l4.91-4.91C20.165 10.92 21 10.085 21 9.048c0-1.038-.835-1.873-2.505-3.543S15.99 3 14.952 3" opacity=".5" />
                        <path fill="currentColor" d="M13.585 17.5L6.5 10.415l-.995.995C3.835 13.08 3 13.915 3 14.952c0 1.038.835 1.873 2.505 3.543S8.01 21 9.048 21c1.037 0 1.872-.835 3.542-2.505z" />
                        <path fill="currentColor" d="M9.033 21H9zm.03 0c.796-.006 1.476-.506 2.51-1.5H21a.75.75 0 0 1 0 1.5z" opacity=".5" />
                    </svg>
                </button>
                <button id="btn-undo" class="btn-tool">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path d="M12.5,8C9.85,8 7.45,9 5.6,10.6L2,7V16H11L7.38,12.38C8.77,11.22 10.54,10.5 12.5,10.5C16.04,10.5 19.05,12.81 20.1,16L22.47,15.22C21.08,11.08 17.14,8 12.5,8Z"/></svg>
                </button> 
                
                <div class="color-picker-wrapper">
                    <svg id="svg-color-icon" viewBox="0 0 24 24">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 9.5 21 7.5 19.5 6C18 4.5 15.5 3.5 12 3.5C6.47715 3.5 2 7.97715 2 13.5C2 16.5 3.5 19 6 20.5C7.5 21.5 9.5 22 12 22ZM6.5 11.5C7.32843 11.5 8 10.8284 8 10C8 9.17157 7.32843 8.5 6.5 8.5C5.67157 8.5 5 9.17157 5 10C5 10.8284 5.67157 11.5 6.5 11.5ZM10.5 8.5C11.3284 8.5 12 7.8284 12 7C12 6.17157 11.3284 5.5 10.5 5.5C9.67157 5.5 9 6.17157 9 7C9 7.8284 9.67157 8.5 10.5 8.5ZM15.5 9.5C16.3284 9.5 17 8.8284 17 8C17 7.17157 16.3284 6.5 15.5 6.5C14.6716 6.5 14 7.17157 14 8C14 8.8284 14.6716 9.5 15.5 9.5ZM17.5 14C18.3284 14 19 13.3284 19 12.5C19 11.6716 18.3284 11 17.5 11C16.6716 11 16 11.6716 16 12.5C16 13.3284 16.6716 14 17.5 14Z"/>
                    </svg>
                    <input type="color" id="color-picker" value="#ff4757">
                </div>

                <input type="range" id="brush-size" min="2" max="15" value="5" class="brush-slider">
                
                <button id="btn-clear-canvas" class="btn-tool">
                    <svg class="mdi-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                </button>
            </div>
        </footer>
    </div>
    <script src="/sw-register.js"></script>
    <script src="app.js"></script>
</body>
</html>
