<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GoMDChordBand song archive</title>
    <style>
        body { font-family: monospace; background: #15181f; color: white; padding-top: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e222b; padding: 20px; border-radius: 8px; border: 1px solid #2f3542; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { color: #ffffff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2f3542; }
        th { background: #2f3542; color: #a4b0be; font-size: 14px; }
        .btn-download { background: #2ed573; border: none; padding: 6px 12px; color: white; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        .btn-download:hover { background: #2ed573; }
        .no-backups { color: #a4b0be; text-align: center; padding: 20px; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #a4b0be; text-decoration: none; }
        .back-link:hover { color: white; }
        a { 
            display: inline-block;
            margin-top: 0px;
            color: #ff4757; 
            text-decoration: none; 
            font-weight: normal; 
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            background: #2f3542;
            cursor: pointer;
            font-weight: 500;
            line-height: 1.2em;
        }
        a:hover { text-decoration: none;background: #3f4a5e; }

        a svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            vertical-align: middle;
            display: inline-block;
            gap: .5em;
        }
        .download-link {padding-left: .5em;}
    </style>
</head>
<body>
    <div class="container">
        <a href="/">
            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <path fill="currentColor" d="M11.596 8.303L8.165 11.63a.5.5 0 0 0 0 .74l6.63 6.43c.414.401 1.205.158 1.205-.37v-5.723z" />
            <path fill="currentColor" d="M16 11.293V5.57c0-.528-.791-.771-1.205-.37l-2.482 2.406z" opacity=".5" />
            </svg> 
        back</a>
        <h2>song archive</h2>
        
        <table>
            <thead>
                <tr>
                    <th>file</th>
                    <th>&nbsp;</th>
                </tr>
            </thead>
            <tbody>
                {{range .Backup}}
                <tr>
                    <td style="font-family: monospace;">{{.}}</td>
                    <td>
                        <a href="/api/songs/backup/download?file={{.}}" class="btn-download"> <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                            <path d="M0 0h24v24H0z" fill="none" />
                            <path fill="currentColor" d="M22 16v-1c0-2.828 0-4.242-.879-5.12C20.242 9 18.828 9 16 9H8c-2.829 0-4.243 0-5.122.88C2 10.757 2 12.17 2 14.997V16c0 2.829 0 4.243.879 5.122C3.757 22 5.172 22 8 22h8c2.828 0 4.243 0 5.121-.878C22 20.242 22 18.829 22 16" opacity=".5" />
                            <path fill="currentColor" fill-rule="evenodd" d="M12 1.25a.75.75 0 0 0-.75.75v10.973l-1.68-1.961a.75.75 0 1 0-1.14.976l3 3.5a.75.75 0 0 0 1.14 0l3-3.5a.75.75 0 1 0-1.14-.976l-1.68 1.96V2a.75.75 0 0 0-.75-.75" clip-rule="evenodd" />
                            </svg><span class="download-link">download</span></a>
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="2" class="no-backups">Noch keine Backups oder alten Versionen vorhanden.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</body>
</html>
